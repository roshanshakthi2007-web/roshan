<!DOCTYPE html>
<html>
    <head>
         <title>Cut-Off</title>
    </head>

    <body>
        <input id="num1" style="width:180px;height:50px;font-size:25px;" placeholder="Maths Mark">
        <input id="num2" style="width:180px;height:50px;font-size:25px;" placeholder="Physics Mark">
        <input id="num3" style="width:180px;height:50px;font-size:25px;" placeholder="Chemistry Mark">
        <br>
        <br>
        <button onclick="calculate()" style="width:120px;height:40px;font-size:20px;">Calculate</button>
        <p id="ans" style="width:180px;height:50px;font-size:30px;">Your Cut-Off:  =</p>

    </body>

    <script>
        function calculate()
        {
        let num1=document.getElementById("num1")
        let num2=document.getElementById("num2")
        let num3=document.getElementById("num3")
        let result=document.getElementById("ans")
        let ans=Number(num1.value)+Number(num2.value)/2+Number(num3.value)/2
        result.textContent="Your Cut-Off: "+ans
        }
    </script>

     <style>
        body{
            background:linear-gradient(120deg,rgb(34, 241, 179),rgb(0, 204, 255));
        }
    </style>

</html>
