<!DOCTYPE html>
<html>
    <head>
        <title>Mini Calculator</title>
    </head>

    <body>
        
        <input id="num1" style="width:180px;height:50px;font-size:30px;">
        <input id="num2" style="width:180px;height:50px;font-size:30px;">
        <br>
        <br>
        <button onclick="add()" style="width:120px;height:40px;font-size:20px;">Add</button>
        <button onclick="subract()" style="width:120px;height:40px;font-size:20px;">Subract</button>
        <button onclick="multiply()" style="width:120px;height:40px;font-size:20px;">Multiply</button>
        <button onclick="divide()" style="width:120px;height:40px;font-size:20px;">Divide</button>
        <p id="ans" style="width:180px;height:50px;font-size:30px;">Result =</p>
    </body>

    <script>

        function add()
        {
        let num1=document.getElementById("num1")
        let num2=document.getElementById("num2")
        let result=document.getElementById("ans")
        let ans=Number(num1.value)+Number(num2.value)
        result.textContent="Result ="+ans
        }
        function subract()
        {
        let num1=document.getElementById("num1")
        let num2=document.getElementById("num2")
        let result=document.getElementById("ans")
        let ans=Number(num1.value)-Number(num2.value)
        result.textContent="Result ="+ans
        }
        function multiply()
        {
        let num1=document.getElementById("num1")
        let num2=document.getElementById("num2")
        let result=document.getElementById("ans")
        let ans=Number(num1.value)*Number(num2.value)
        result.textContent="Result ="+ans
        }
        function divide()
        {
        let num1=document.getElementById("num1")
        let num2=document.getElementById("num2")
        let result=document.getElementById("ans")
        let ans=Number(num1.value)/Number(num2.value)
        result.textContent="Result ="+ans
        }
    </script>

    <style>
        body{
            background:linear-gradient(120deg,rgb(141, 130, 238),rgb(0, 238, 255));
        }
    </style>
</html>
